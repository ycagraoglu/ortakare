name: Frontend CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Upload build and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-verification-${{ github.sha }}
          path: |
            frontend/dist
            frontend/coverage
          if-no-files-found: ignore
          retention-days: 7
