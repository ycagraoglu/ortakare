name: Backend CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, test and verify migrations
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ortakare_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ortakare_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ConnectionStrings__PostgreSql: Host=localhost;Port=5432;Database=ortakare_ci;Username=postgres;Password=postgres
      Jwt__Issuer: Ortakare.Api.CI
      Jwt__Audience: Ortakare.Pwa.CI
      Jwt__SigningKey: CI_ONLY_SIGNING_KEY_WITH_AT_LEAST_32_CHARACTERS
      Cors__AllowedOrigins__0: https://pwa.ortakare.test
      Hangfire__Enabled: "false"
      GalleryExportCleanup__Enabled: "false"
      OrphanFileCleanup__Enabled: "false"
      Observability__Enabled: "false"

    defaults:
      run:
        working-directory: backend
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga

      - name: Prepare diagnostics
        run: mkdir -p "${{ github.workspace }}/BackendCiLogs" "${{ github.workspace }}/TestResults"

      - name: Show .NET environment
        run: |
          set -o pipefail
          dotnet --info | tee "${{ github.workspace }}/BackendCiLogs/dotnet-info.log"

      - name: Restore
        run: |
          set -o pipefail
          dotnet restore Ortakare.slnx 2>&1 | tee "${{ github.workspace }}/BackendCiLogs/restore.log"

      - name: Build
        run: |
          set -o pipefail
          dotnet build Ortakare.slnx --configuration Release --no-restore --warnaserror 2>&1 | tee "${{ github.workspace }}/BackendCiLogs/build.log"

      - name: Test
        run: |
          set -o pipefail
          dotnet test Ortakare.slnx \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory "${{ github.workspace }}/TestResults" \
            2>&1 | tee "${{ github.workspace }}/BackendCiLogs/test.log"

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef --version 10.0.0

      - name: Apply migrations to clean PostgreSQL
        run: |
          set -o pipefail
          dotnet ef database update \
            --project src/Ortakare.Api/Ortakare.Api.csproj \
            --startup-project src/Ortakare.Api/Ortakare.Api.csproj \
            --configuration Release \
            --no-build \
            2>&1 | tee "${{ github.workspace }}/BackendCiLogs/migration-update.log"

      - name: Verify model snapshot consistency
        run: |
          set -o pipefail
          dotnet ef migrations has-pending-model-changes \
            --project src/Ortakare.Api/Ortakare.Api.csproj \
            --startup-project src/Ortakare.Api/Ortakare.Api.csproj \
            --configuration Release \
            --no-build \
            2>&1 | tee "${{ github.workspace }}/BackendCiLogs/model-consistency.log"

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ci-diagnostics
          path: |
            BackendCiLogs
            TestResults
          if-no-files-found: warn
          retention-days: 7
