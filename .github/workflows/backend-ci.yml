name: Backend CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga

      - name: Show .NET environment
        run: |
          mkdir -p "${{ github.workspace }}/BackendCiLogs"
          dotnet --info | tee "${{ github.workspace }}/BackendCiLogs/dotnet-info.log"

      - name: Restore
        run: |
          set -o pipefail
          dotnet restore Ortakare.slnx 2>&1 | tee "${{ github.workspace }}/BackendCiLogs/restore.log"

      - name: Build
        run: |
          set -o pipefail
          dotnet build Ortakare.slnx --configuration Release --no-restore --warnaserror 2>&1 | tee "${{ github.workspace }}/BackendCiLogs/build.log"

      - name: Test
        run: |
          set -o pipefail
          dotnet test Ortakare.slnx \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory "${{ github.workspace }}/TestResults" \
            2>&1 | tee "${{ github.workspace }}/BackendCiLogs/test.log"

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ci-diagnostics
          path: |
            BackendCiLogs
            TestResults
          if-no-files-found: warn
          retention-days: 7
