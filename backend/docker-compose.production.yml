services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ortakare-api:production
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health/application >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - ortakare

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ortakare
      POSTGRES_USER: ortakare
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ortakare -d ortakare"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ortakare

networks:
  ortakare:
    driver: bridge

volumes:
  postgres-data:
